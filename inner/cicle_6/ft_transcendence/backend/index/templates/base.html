<!DOCTYPE html>
{% load static %} {% load render_vite_bundle %}

<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      .social-logo-wrapper {
        position: relative;
        left: 6px;
      }
      .social-text {
        position: relative;
        padding: 20px;
      }
      #social-section {
        display: flex;
        justify-content: center;
      }
    </style>

    <!-- {% for js in reactjs_assets_js_paths %}
    <script src="{% static js %}"></script>
    {% endfor %} {% for css in reactjs_assets_css_paths %}
    <link rel="stylesheet" href="{% static css %}" />
    {% endfor %} -->

    <title>ft_transcendence</title>

    {% if debug %}
    <script type="module" src="http://localhost:8002/@vite/client"></script>

    <!-- React HMR -->
    <script type="module">
      import RefreshRuntime from "http://localhost:8002/@react-refresh";
      if (RefreshRuntime) {
        RefreshRuntime.injectIntoGlobalHook(window);
        window.$RefreshReg$ = () => {};
        window.$RefreshSig$ = () => (type) => type;
        window.__vite_plugin_react_preamble_installed__ = true;
      }
    </script>
    {% endif %}

    <link
      rel="shortcut icon"
      type="image/png"
      sizes="16x16"
      href="{% static 'favicons/favicon-16x16.png' %}"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'favicons/favicon-32x32.png' %}"
    />

    {% block head %} {% endblock %}
  </head>
  <!-- <body class="p-3 mb-2 text-white"> -->
  <body class="p-3 mb-2 text-white bg-dark user-scalable=no">
    <div id="root"></div>

    {% block body %} {% endblock %}
    <!-- Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
